<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Syntax</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.15/lib/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.15/theme/dracula.min.css" />
</head>

<body>
  <a href="index.html">Ana Sayfa</a>
  <hr />
  <h1>Syntax</h1>
  <div>Javascript kodları html dosyası içinde
    <script> </script> tagları arasına veya harici bir .js dosyasına yazılır.
  </div>

  <!-- Örnek -->
  <div class="editor-block" data-editor>
    <h2>&ltscript&gt&lt/script&gt</h2>
    <div class="editor-panels">
      <div class="panel">
        <div class="label">HTML</div>
        <textarea class="htmlCode">
<!DOCTYPE html>
  <html lang="tr">
    <head>
      <title>Document</title>
    </head>
    <body>
      <p id="demo"></p>

      <script>
        document.getElementById("demo").innerHTML = "Hello Javascript";
      </script>
    </body>
  </html></textarea>
      </div>
      <div class="panel hide">
        <div class="label">CSS</div>
        <textarea class="cssCode"></textarea>
      </div>
      <div class="panel hide">
        <div class="label">JavaScript</div>
        <textarea class="jsCode"></textarea>
      </div>
    </div>
    <div class="button-bar">
      <button class="run-btn">Çalıştır</button>
    </div>
    <iframe class="output"></iframe>
  </div>

  <!-- Örnek -->
  <div class="editor-block" data-editor>
    <h2>script.js</h2>
    <div class="editor-panels">
      <div class="panel">
        <div class="label">HTML</div>
        <textarea class="htmlCode">
<!DOCTYPE html>
  <html lang="tr">
    <head>
      <title>Document</title>
    </head>
    <body>
      <p id="demo"></p>
      <script src="script.js"></script>
    </body>
  </html></textarea>
      </div>
      <div class="panel hide">
        <div class="label">CSS</div>
        <textarea class="cssCode"></textarea>
      </div>
      <div class="panel">
        <div class="label">JavaScript</div>
        <textarea class="jsCode">document.getElementById("demo").innerHTML = "Hello Javascript";</textarea>
      </div>
    </div>
    <div class="button-bar">
      <button class="run-btn">Çalıştır</button>
    </div>
    <iframe class="output"></iframe>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.15/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.15/mode/xml/xml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.15/mode/css/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.15/mode/javascript/javascript.min.js"></script>
  <script src="editor.js"></script>
</body>

</html>
